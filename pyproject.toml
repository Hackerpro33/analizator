[tool.black]
line-length = 100
target-version = ["py310", "py311"]
include = "backend/app"

[tool.ruff]
line-length = 100
target-version = "py310"
exclude = [
  "backend/app/venv",
  "backend/node_modules",
  "frontend/node_modules",
]

[tool.ruff.lint]
select = ["E", "F", "B", "UP", "N", "Q"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"backend/app/tests/*" = ["S101"]

[tool.pytest.ini_options]
addopts = "--strict-markers --cov=backend/app --cov-report=xml --cov-report=term-missing"
testpaths = ["backend/app/tests"]
minversion = "7.0"
filterwarnings = [
  "error::DeprecationWarning",
]

[tool.coverage.run]
branch = true
source = ["backend/app"]
omit = [
  "backend/app/venv/*",
  "backend/node_modules/*",
]

[tool.coverage.report]
fail_under = 80.0
show_missing = true
precision = 2

[tool.coverage.xml]
output = "coverage.xml"

