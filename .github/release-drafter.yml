name-template: 'v$NEXT_PATCH_VERSION'
tag-template: 'v$NEXT_PATCH_VERSION'
change-template: '- $TITLE (#$NUMBER) by @$AUTHOR'
no-changes-template: '- Нет изменений'
categories:
  - title: ":sparkles: Новые возможности"
    labels:
      - feature
      - feat
  - title: ":bug: Исправления ошибок"
    labels:
      - fix
      - bug
  - title: ":zap: Производительность"
    labels:
      - perf
  - title: ":construction: Технический долг"
    labels:
      - chore
      - refactor
  - title: ":books: Документация"
    labels:
      - docs
version-resolver:
  major:
    labels:
      - major
      - breaking-change
      - breaking
  minor:
    labels:
      - feature
      - feat
      - enhancement
  patch:
    labels:
      - fix
      - bug
      - perf
      - chore
      - refactor
      - docs
  default: patch
prerelease:
  enabled: false
changelog:
  exclude-labels:
    - skip-changelog
  categories:
    - title: Новые возможности
      labels:
        - feat
        - feature
    - title: Исправления
      labels:
        - fix
        - bug
    - title: Обновления документации
      labels:
        - docs
    - title: Прочие изменения
      labels: []
  sort:
    order: asc
    on: merged_at
autolabeler:
  - label: chore
    title:
      - '^chore'
  - label: docs
    title:
      - '^docs'
  - label: fix
    title:
      - '^fix'
  - label: feature
    title:
      - '^feat'
  - label: perf
    title:
      - '^perf'
  - label: breaking-change
    title:
      - '!'
template: |
  ## Изменения

  $CHANGES

  ## Благодарности

  $CONTRIBUTORS
